name: "🐛 Bug Report"
description: Report a bug or unexpected behavior in OpenSteamTool.
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill in the fields below so we can reproduce and fix the issue quickly.

        - For issues with a **specific game** (Denuvo / SteamStub / unlock not working), please use the **Game Compatibility** template instead.
        - Make sure you are running the latest build before reporting.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and confirmed this has not been reported.
          required: true
        - label: I am using the latest build version from the releases page.
          required: true

  - type: input
    id: steam-version
    attributes:
      label: Steam client version
      description: Found in Steam → Help → About Steam (Build number).
      placeholder: "e.g. 1733967017"
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: Windows version
      description: Optional but strongly recommended — helps us reproduce OS-specific issues.
      placeholder: "e.g. Windows 11 23H2 (22631.4317)"

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Place DLLs in Steam root directory
        2. Launch Steam with ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: log-files
    attributes:
      label: Log files
      description: |
        Debug builds write logs to `<Steam>/opensteamtool/*.log` (`main.log`, `ipc.log`, etc.).

        **Pack the whole `<Steam>/opensteamtool/` folder into an archive (`.zip`, `.tar.gz`, `.tgz`, `.gz`) and drag-and-drop it into this box.**

  - type: textarea
    id: lua
    attributes:
      label: Lua configuration (if relevant)
      description: Paste the Lua script you were using, with any sensitive tokens redacted.
      render: lua

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, steam logs, or anything else that may help.
