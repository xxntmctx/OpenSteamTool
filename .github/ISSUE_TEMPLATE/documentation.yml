name: "📚 Documentation Issue"
description: Report missing, unclear, or incorrect documentation.
title: "[DOCS] "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the docs! Please point us at the section that needs work and suggest a fix if you have one.

  - type: input
    id: location
    attributes:
      label: Location
      description: Which file or section is affected?
      placeholder: "e.g. README.md → Manifest via Lua"
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: Kind of issue
      options:
        - Missing information
        - Incorrect / outdated
        - Unclear wording
        - Broken link
        - Typo
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is wrong, missing, or confusing?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
      description: If you have a concrete suggestion or wording, share it here.
