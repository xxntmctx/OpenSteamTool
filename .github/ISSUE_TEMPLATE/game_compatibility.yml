name: "🎮 Game Compatibility"
description: Report a specific game that does not work correctly.
title: "[GAME] <AppID> <Game Name>: "
labels: ["compatibility"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template when a **specific game** is not working as expected. For generic issues, please use the **Bug Report** template instead.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and confirmed this game has not been reported.
          required: true
        - label: I am using the latest build from the releases page.
          required: true

  - type: input
    id: appid
    attributes:
      label: AppID
      placeholder: "e.g. 1361510"
    validations:
      required: true

  - type: input
    id: game-name
    attributes:
      label: Game name
      placeholder: "e.g. Death Stranding"
    validations:
      required: true

  - type: textarea
    id: protection
    attributes:
      label: Game protection (if known)
      description: Is the game protected by Denuvo, SteamStub, neither, or unsure?
      placeholder: "e.g. Denuvo + SteamStub"

  - type: input
    id: steam-version
    attributes:
      label: Steam client version
      placeholder: "e.g. 1733967017"
    validations:
      required: true

  - type: textarea
    id: lua
    attributes:
      label: Lua configuration
      description: Paste the Lua script you are using for this game. Redact any sensitive tokens.
      render: lua
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: What happens
      description: Describe the actual behavior — error messages, game launcher state, crash, etc.
    validations:
      required: true

  - type: textarea
    id: log-files
    attributes:
      label: Log files
      description: |
        Most relevant logs for this template: `manifest.log`, `decryptionkey.log`, `ipc.log`, `pics.log`, `achievement.log` (Debug build only).

        **Pack the whole `<Steam>/opensteamtool/` folder into an archive (`.zip`, `.tar.gz`, `.tgz`, `.gz`) and drag-and-drop it into this box.**

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, steam logs, or anything else that may help.
